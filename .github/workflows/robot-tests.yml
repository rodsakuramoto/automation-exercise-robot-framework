name: Robot Framework Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ==========================================
  # 1. TEST CHROMIUM (Linux)
  # ==========================================
  test-chromium:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - 'authentication.robot'
          - 'cart_and_checkout.robot'
          - 'contact_us.robot'
          - 'home_page.robot'
          - 'products.robot'
          - 'subscription.robot'
          - 'test_cases_page.robot'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install robotframework robotframework-seleniumlibrary robotframework-faker

      - name: Run Tests with Auto-Retry
        uses: nick-fields/retry@v4
        with:
          timeout_seconds: 30
          retry_wait_seconds: 30
          max_attempts: 2
          command: robot -d results -v BROWSER:chrome -o output-${{ strategy.job-index }}.xml "test_cases/${{ matrix.suite }}"

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: robot-results-chrome-${{ strategy.job-index }}
          path: results/output-${{ strategy.job-index }}.xml
          retention-days: 1

  # ==========================================
  # 2. TEST FIREFOX (Linux)
  # ==========================================
  test-firefox:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - 'authentication.robot'
          - 'cart_and_checkout.robot'
          - 'contact_us.robot'
          - 'home_page.robot'
          - 'products.robot'
          - 'subscription.robot'
          - 'test_cases_page.robot'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install robotframework robotframework-seleniumlibrary robotframework-faker

      - name: Run Tests with Auto-Retry
        uses: nick-fields/retry@v4
        with:
          timeout_seconds: 30
          retry_wait_seconds: 30
          max_attempts: 2
          command: robot -d results -v BROWSER:chrome -o output-${{ strategy.job-index }}.xml "test_cases/${{ matrix.suite }}"

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: robot-results-firefox-${{ strategy.job-index }}
          path: results/output-${{ strategy.job-index }}.xml
          retention-days: 1

  # ==========================================
  # 3. TEST WEBKIT / SAFARI (macOS)
  # ==========================================
  test-webkit:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - 'authentication.robot'
          - 'cart_and_checkout.robot'
          - 'contact_us.robot'
          - 'home_page.robot'
          - 'products.robot'
          - 'subscription.robot'
          - 'test_cases_page.robot'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install robotframework robotframework-seleniumlibrary robotframework-faker

      - name: Enable Safaridriver
        run: sudo safaridriver --enable

      - name: Run Tests with Auto-Retry
        uses: nick-fields/retry@v4
        with:
          timeout_seconds: 30
          retry_wait_seconds: 30
          max_attempts: 2
          command: robot -d results -v BROWSER:chrome -o output-${{ strategy.job-index }}.xml "test_cases/${{ matrix.suite }}"

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: robot-results-webkit-${{ strategy.job-index }}
          path: results/output-${{ strategy.job-index }}.xml
          retention-days: 1

  # ==========================================
  # 4. GENERATE REPORTS (Separado por Browser)
  # ==========================================
  generate-reports:
    needs: [test-chromium, test-firefox, test-webkit]
    if: always()
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox, webkit]

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Report Tools
        run: |
          pip install robotframework
          pip install robotframework-ghareports

      - name: Download Results for ${{ matrix.browser }}
        uses: actions/download-artifact@v8
        with:
          pattern: robot-results-${{ matrix.browser }}-*
          path: all-results-${{ matrix.browser }}
          merge-multiple: true

      - name: Merge XMLs (Rebot)
        run: rebot --name "Relatório ${{ matrix.browser }}" --outputdir final-results --output merged-output-${{ matrix.browser }}.xml all-results-${{ matrix.browser }}/*.xml

      - name: Generate GitHub Actions Summary
        if: always()
        run: ghareports -r final-results/merged-output-${{ matrix.browser }}.xml

      - name: Upload Consolidated HTML Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: Consolidated-Report-${{ matrix.browser }}
          path: final-results/