name: Robot Framework Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: ['authentication.robot', 'cart_and_checkout.robot', 'contact_us.robot', 'home_page.robot', 'products.robot', 'subscription.robot', 'test_cases_page.robot']

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install robotframework
          pip install robotframework-seleniumlibrary
          pip install robotframework-faker
          pip install robotframework-ghareports

      - name: Run Tests with Matrix
        run: robot --listener robotframework_ghareports -d results "test_cases/${{ matrix.suite }}" || echo "ROBOT_EXIT_CODE=$?" >> $GITHUB_ENV

      - name: Fail Job if Tests Encountered Errors
        if: env.ROBOT_EXIT_CODE != '' && env.ROBOT_EXIT_CODE != '0'
        run: exit ${{ env.ROBOT_EXIT_CODE }}

      - name: Upload Test Results
        if: always() # Ensures reports are uploaded even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: robot-test-results-${{ matrix.suite }}
          path: results/