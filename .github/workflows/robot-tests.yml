name: Robot Framework Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ==========================================
  # JOB 1: RUN TESTS IN PARALLEL (MATRIX)
  # ==========================================
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - 'authentication.robot'
          - 'cart_and_checkout.robot'
          - 'contact_us.robot'
          - 'home_page.robot'
          - 'products.robot'
          - 'subscription.robot'
          - 'test_cases_page.robot'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install robotframework
          pip install robotframework-seleniumlibrary
          pip install robotframework-faker
          # 💡 Removed ghareports from here. We will use it in Job 2!

      - name: Run Tests with Matrix
        # 💡 Generates a uniquely named XML file for each matrix job to avoid conflicts
        run: robot -d results -o output-${{ strategy.job-index }}.xml "test_cases/${{ matrix.suite }}"

      - name: Upload Test Results
        if: always() # 🚨 Ensures XMLs are uploaded even if tests fail
        uses: actions/upload-artifact@v6
        with:
          name: robot-test-results-${{ strategy.job-index }}
          path: results/output-${{ strategy.job-index }}.xml
          retention-days: 1

  # ==========================================
  # JOB 2: MERGE XMLs AND GENERATE SUMMARY
  # ==========================================
  generate-report:
    needs: test
    if: always() # 🚨 CRITICAL: Runs even if the 'test' matrix jobs failed
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Robot Framework and GHAReports
        run: |
          pip install robotframework
          pip install robotframework-ghareports # 💡 Installed here to process the merged XML

      - name: Download all Matrix Results
        uses: actions/download-artifact@v6
        with:
          pattern: robot-test-results-*
          path: all-results
          merge-multiple: true

      - name: Merge Results (Rebot)
        # 💡 Combines all scattered XMLs into a single output.xml
        run: rebot --name "Consolidated Test Report" --outputdir final-results --output merged-output.xml all-results/*.xml

      - name: Generate GitHub Actions Summary (GHAReports)
        if: always() # 🚨 CRITICAL: Runs even if Rebot detects failed tests in the previous step
        # 💡 Uses GHAReports as a standalone CLI tool to read the merged XML
        run: ghareports -r final-results/merged-output.xml

      - name: Upload Consolidated HTML Report (Optional)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: Consolidated-Robot-Report
          path: final-results/