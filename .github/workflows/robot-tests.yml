name: Robot Framework Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ==========================================
  # JOB 1: RUN TESTS IN PARALLEL (MATRIX)
  # ==========================================
  test:
    runs-on: ${{ matrix.environment.os }}
    strategy:
      fail-fast: false
      matrix:
        suite:
          - 'authentication.robot'
          - 'cart_and_checkout.robot'
          - 'contact_us.robot'
          - 'home_page.robot'
          - 'products.robot'
          - 'subscription.robot'
          - 'test_cases_page.robot'
        environment:
          - { os: 'ubuntu-latest', browser: 'chrome' }
          - { os: 'ubuntu-latest', browser: 'headlessfirefox' }
          - { os: 'macos-latest', browser: 'safari' }

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install robotframework
          pip install robotframework-seleniumlibrary
          pip install robotframework-faker

      - name: Install Geckodriver (Firefox only)
        if: matrix.environment.browser == 'headlessfirefox'
        run: |
          sudo apt-get update
          sudo apt-get install -y firefox-geckodriver

      - name: Enable Safaridriver (Safari only)
        if: matrix.environment.browser == 'safari'
        run: sudo safaridriver --enable

      - name: Run Tests with Matrix
        # 💡 5. Injetamos o browser dinâmico no Robot Framework
        run: robot -d results -v BROWSER:${{ matrix.environment.browser }} -o output-${{ strategy.job-index }}.xml "test_cases/${{ matrix.suite }}"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: robot-test-results-${{ matrix.environment.browser }}-${{ strategy.job-index }}
          path: results/output-${{ strategy.job-index }}.xml
          retention-days: 1

  # ==========================================
  # JOB 2: MERGE XMLs AND GENERATE SUMMARY
  # ==========================================
  generate-report:
    needs: test
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Robot Framework and GHAReports
        run: |
          pip install robotframework
          pip install robotframework-ghareports

      - name: Download all Matrix Results
        uses: actions/download-artifact@v8
        with:
          pattern: robot-test-results-*
          path: all-results
          merge-multiple: true

      - name: Merge Results (Rebot)
        run: rebot --name "Consolidated Test Report" --outputdir final-results --output merged-output.xml all-results/*.xml

      - name: Generate GitHub Actions Summary (GHAReports)
        if: always()
        run: ghareports -r final-results/merged-output.xml

      - name: Upload Consolidated HTML Report (Optional)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: Consolidated-Robot-Report
          path: final-results/